[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bitbabble-sdk"
version = "1.0.2"
description = "Official Python SDK for the BitBabble sentiment analysis API"
readme = "README.md"
license = "MIT"
requires-python = ">=3.8"
authors = [{ name = "BitBabble" }]
keywords = ["bitbabble", "sentiment", "sentiment-analysis", "nlp", "api", "sdk"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = ["httpx>=0.24.0"]

[project.urls]
Homepage = "https://bitbabble.net"
Documentation = "https://bitbabble.net/docs"
Repository = "https://github.com/bitbabble/bitbabble-sdk"

[tool.setuptools.packages.find]
include = ["bitbabble*"]
